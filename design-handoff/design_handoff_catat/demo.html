<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>catat — live demo (sketchbook)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Patrick+Hand&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4ecd6;
  --paper-2:#fbf5dc;
  --paper-edge:#e9dfc1;
  --paper-dark:#e2d6b1;
  --ink:#211b14;
  --ink-soft:#3a3128;
  --pencil:#6b665e;
  --pencil-soft:#9c958a;
  --line:#cdbf94;
  --line-soft:#dccfa8;
  --rule:#a3c4d4;
  --margin:#d68a8a;
  --marker-red:#c0392b;
  --marker-blue:#2c5282;
  --marker-green:#2f7a5b;
  --highlight:#ffea7a;
  --postit:#fff3a6;
  --postit-pink:#ffd1d9;
  --postit-mint:#c7e9d0;
  --postit-blue:#cfe2f7;
  --tape:rgba(255,230,140,.65);
  --hand:"Caveat", "Patrick Hand", cursive;
  --type:"Special Elite", "Courier New", monospace;
  --body:"Patrick Hand", "Kalam", system-ui, sans-serif;
  --shadow: 0 1px 0 rgba(0,0,0,.04), 0 14px 30px -16px rgba(50,30,10,.28), 0 2px 6px -2px rgba(50,30,10,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);font-size:18px;line-height:1.55;color:var(--ink);
  background:var(--paper);
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.13  0 0 0 0 0.10  0 0 0 0 0.07  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>"),
    radial-gradient(circle at 20% 30%, rgba(120,90,40,.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(80,60,20,.06), transparent 40%),
    linear-gradient(180deg,#f6eed8 0%, var(--paper) 35%, var(--paper-edge) 100%);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
::selection{background:var(--highlight);color:var(--ink)}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:0}
a{color:inherit;text-decoration:none}
.wrap{max-width:1280px;margin:0 auto;padding:0 28px}

/* ---- top nav ---- */
.nav{padding:14px 0;border-bottom:1px dashed var(--line);background:linear-gradient(180deg, color-mix(in oklab, var(--paper) 92%, transparent), color-mix(in oklab, var(--paper) 70%, transparent));position:sticky;top:0;z-index:30;backdrop-filter:blur(6px)}
.nav-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--hand);font-size:28px;font-weight:700;line-height:1}
.brand .glyph{width:36px;height:36px;border-radius:9px;background:var(--ink);color:var(--paper);display:grid;place-items:center;transform:rotate(-3deg);box-shadow:2px 2px 0 var(--marker-red)}
.brand .glyph svg{width:20px;height:20px}
.brand small{font-family:var(--type);font-size:11px;letter-spacing:.1em;color:var(--pencil);text-transform:uppercase;margin-left:4px}
.brand a{color:inherit}

/* tab strip — notebook tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{
  position:relative;
  padding:10px 22px 12px;
  font-family:var(--hand);font-size:24px;font-weight:600;line-height:1;
  background:var(--paper-dark);
  color:var(--ink-soft);
  border:2px solid var(--ink);border-bottom:0;
  border-radius:14px 14px 4px 4px;
  margin-bottom:-2px;
  transform:translateY(2px);
  box-shadow:2px -2px 0 var(--ink);
  transition:transform .12s ease;
}
.tab:hover{transform:translateY(0px)}
.tab.active{
  background:var(--paper-2);color:var(--ink);
  transform:translateY(-2px);
  z-index:2;
  box-shadow:3px -3px 0 var(--ink);
}
.tab .ord{font-family:var(--type);font-size:11px;color:var(--pencil);letter-spacing:.1em;margin-right:6px;text-transform:uppercase}

/* connect btn */
.btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:9px 16px;font-family:var(--body);font-size:16px;background:var(--paper);color:var(--ink);border-radius:8px;box-shadow:inset 0 0 0 2px var(--ink), 3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:inset 0 0 0 2px var(--ink), 4px 4px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:inset 0 0 0 2px var(--ink), 1px 1px 0 var(--ink)}
.btn-primary{background:var(--marker-red);color:var(--paper)}
.btn-ghost{box-shadow:inset 0 0 0 1.5px var(--pencil-soft);font-style:italic;color:var(--ink-soft);background:transparent}
.btn-ghost:hover{box-shadow:inset 0 0 0 1.5px var(--ink);color:var(--ink);transform:none}
.btn-sm{padding:6px 12px;font-size:14px;box-shadow:inset 0 0 0 1.6px var(--ink), 2px 2px 0 var(--ink)}
.btn-sm:hover{box-shadow:inset 0 0 0 1.6px var(--ink), 3px 3px 0 var(--ink)}

.wallet-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;font-family:var(--type);font-size:12px;border:1.5px dashed var(--ink);border-radius:999px;background:var(--postit-mint);color:var(--ink);transform:rotate(-1deg)}
.wallet-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--marker-green);box-shadow:0 0 0 2px var(--paper)}

/* ---- shared sheet (notebook page) ---- */
.sheet{
  position:relative;
  background:var(--paper-2);
  background-image:
    repeating-linear-gradient(180deg, transparent 0 31px, var(--rule) 31px 32px),
    linear-gradient(90deg, transparent 0 56px, var(--margin) 56px 57px, transparent 57px 100%);
  border-radius:4px 14px 4px 14px;
  padding:36px 40px 36px 78px;
  box-shadow:0 0 0 1px var(--paper-dark), 2px 2px 0 -1px #efe5c5, 4px 4px 0 -1px #e9dec0, 6px 6px 0 -1px #e3d8b8, 8px 30px 50px -20px rgba(50,30,10,.35);
  margin:30px 0 50px;
}
.sheet::before{
  content:"";position:absolute;left:14px;top:30px;width:14px;height:14px;border-radius:50%;background:var(--paper-edge);
  box-shadow:0 80px 0 var(--paper-edge), 0 160px 0 var(--paper-edge), 0 240px 0 var(--paper-edge), 0 320px 0 var(--paper-edge), 0 400px 0 var(--paper-edge), 0 480px 0 var(--paper-edge), 0 560px 0 var(--paper-edge), inset 1px 1px 2px rgba(0,0,0,.2);
}
.sheet-head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1.5px solid var(--ink);padding-bottom:8px;margin-bottom:22px;font-family:var(--type);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pencil)}
.sheet-head .date{font-family:var(--hand);font-size:18px;color:var(--ink);text-transform:none;letter-spacing:0}
.sheet h1{font-family:var(--hand);font-weight:700;font-size:54px;line-height:1;margin:0 0 8px;color:var(--ink);letter-spacing:-.01em}
.sheet h1 .marker{color:var(--marker-red)}
.sheet .lede{font-family:var(--body);font-size:18px;color:var(--ink-soft);margin:0 0 22px;max-width:60ch}

/* form atoms (sketch) */
.fld{margin-bottom:18px}
.fld-label{font-family:var(--type);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--pencil);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.req{color:var(--marker-red);font-family:var(--hand);font-size:18px}
.input,.textarea,.select{
  width:100%;font-family:var(--hand);font-size:24px;color:var(--ink);
  padding:0 6px 4px;background:transparent;border:0;border-bottom:2px solid var(--ink);outline:0;
}
.textarea{min-height:80px;resize:vertical;padding-bottom:6px;line-height:1.3}
.select{cursor:pointer;appearance:none;background:transparent}
.lock-tag{font-family:var(--type);font-size:10px;letter-spacing:.1em;padding:2px 7px;border:1.2px solid var(--marker-red);background:var(--postit-pink);color:var(--marker-red);border-radius:6px;display:inline-flex;align-items:center;gap:4px;transform:rotate(1.5deg)}
.lock-tag svg{width:11px;height:11px}

/* sticky postits */
.postit{position:relative;padding:14px 16px;font-family:var(--hand);font-size:18px;color:var(--ink);background:var(--postit);box-shadow:var(--shadow);border-radius:2px 8px 2px 8px}
.postit::before{content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%) rotate(-4deg);width:64px;height:18px;background:var(--tape);border:1px solid rgba(150,110,30,.2);border-radius:2px}
.postit b{font-family:var(--body);font-size:13px;color:var(--pencil);font-weight:400;display:block;margin-bottom:2px;letter-spacing:.06em;text-transform:uppercase}
.postit code{font-family:var(--type);font-size:13px;color:var(--ink);background:rgba(255,255,255,.5);padding:1px 4px;border-radius:3px}

/* tag chip */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--type);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border:1.5px solid var(--ink);border-radius:999px;background:var(--paper)}
.chip.red{background:var(--postit-pink);border-color:var(--marker-red);color:var(--marker-red)}
.chip.green{background:var(--postit-mint);border-color:var(--marker-green);color:var(--marker-green)}
.chip.blue{background:var(--postit-blue);border-color:var(--marker-blue);color:var(--marker-blue)}

/* ============================================== */
/* BUILDER                                          */
/* ============================================== */
.builder-grid{display:grid;grid-template-columns:230px 1fr 280px;gap:22px;align-items:flex-start}
@media (max-width:1100px){.builder-grid{grid-template-columns:1fr}}

.palette{
  background:var(--paper-2);border:2px solid var(--ink);border-radius:8px;padding:18px 16px;
  box-shadow:4px 4px 0 var(--ink);
  transform:rotate(-.6deg);
}
.palette h4{font-family:var(--hand);font-size:24px;margin:0 0 6px;color:var(--ink)}
.palette p{font-family:var(--body);font-size:14px;color:var(--pencil);margin:0 0 14px}
.palette-list{display:flex;flex-direction:column;gap:8px}
.palette-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  border:1.5px dashed var(--ink);border-radius:6px;background:var(--paper);
  font-family:var(--body);font-size:15px;cursor:grab;
  transition:transform .1s ease, background .1s ease;
}
.palette-item:hover{background:var(--postit);transform:translate(-1px,-1px)}
.palette-item .ico{width:26px;height:26px;border-radius:5px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:var(--hand);font-weight:700;font-size:18px;flex:none}

/* canvas (the building form) */
.canvas-wrap{position:relative}
.form-meta{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.form-meta-l{flex:1;min-width:280px}
.form-meta-l h2{font-family:var(--hand);font-weight:700;font-size:42px;margin:0;line-height:1;border-bottom:2px solid var(--ink);padding-bottom:4px;display:flex;align-items:center;gap:10px;outline:0}
.form-meta-l h2 small{font-family:var(--type);font-size:11px;color:var(--pencil);letter-spacing:.1em;text-transform:uppercase;margin-left:auto}
.form-meta-l p{font-family:var(--body);font-size:16px;color:var(--ink-soft);margin:6px 0 0}

.field-stack{display:flex;flex-direction:column;gap:14px;margin-top:8px}
.field-card{
  position:relative;
  background:var(--paper-2);
  border:2px solid var(--ink);border-radius:8px;
  padding:18px 18px 16px;
  box-shadow:3px 3px 0 var(--ink);
  transition:transform .12s ease;
}
.field-card.selected{box-shadow:5px 5px 0 var(--marker-red);background:#fff8db;transform:rotate(-.3deg)}
.field-card .grip{position:absolute;left:-18px;top:50%;transform:translateY(-50%);font-family:var(--type);color:var(--pencil);font-size:18px;cursor:grab;user-select:none}
.field-card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.field-card-h .label-line{display:flex;align-items:center;gap:8px;font-family:var(--type);font-size:11px;letter-spacing:.12em;color:var(--pencil);text-transform:uppercase}
.field-card-actions{display:flex;gap:6px}
.icon-btn{width:30px;height:28px;border-radius:6px;display:grid;place-items:center;border:1.5px dashed var(--ink);background:var(--paper);color:var(--ink);transition:background .12s}
.icon-btn:hover{background:var(--postit)}
.icon-btn.lock-on{background:var(--postit-pink);border:1.5px solid var(--marker-red);color:var(--marker-red);transform:rotate(-2deg)}
.icon-btn svg{width:14px;height:14px}
.field-q{font-family:var(--hand);font-size:26px;color:var(--ink);outline:0;border-bottom:1.5px dashed var(--line);padding:2px 4px;margin:0 0 6px}
.field-preview{padding:6px 4px}
.field-preview .placeholder{font-family:var(--hand);font-size:22px;color:var(--pencil-soft);font-style:italic;border-bottom:2px solid var(--ink);padding-bottom:3px}
.field-preview .placeholder.box{border:2px dashed var(--line);border-radius:6px;padding:10px;text-align:left;background:rgba(255,255,255,.3)}
.field-preview .opt{display:block;font-family:var(--hand);font-size:22px;color:var(--ink);margin-bottom:2px}
.field-preview .opt::before{content:"○";color:var(--ink);margin-right:8px}
.field-meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-family:var(--type);font-size:11px;color:var(--pencil);letter-spacing:.06em}
.field-meta .req-toggle{display:inline-flex;align-items:center;gap:5px}

.add-field{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border:2px dashed var(--ink);border-radius:8px;
  font-family:var(--hand);font-size:22px;color:var(--ink-soft);
  background:transparent;cursor:pointer;
}
.add-field:hover{background:var(--postit);color:var(--ink)}

/* settings panel right */
.settings{display:flex;flex-direction:column;gap:14px}
.set-card{
  background:var(--paper-2);border:2px solid var(--ink);border-radius:8px;padding:16px;
  box-shadow:3px 3px 0 var(--ink);
}
.set-card.selected{background:#fff8db;box-shadow:4px 4px 0 var(--marker-red)}
.set-card h5{font-family:var(--hand);font-size:24px;margin:0 0 10px;color:var(--ink);display:flex;align-items:center;gap:8px}
.set-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-family:var(--body);font-size:15px;color:var(--ink-soft);gap:8px}
.set-row label{font-family:var(--type);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pencil)}
.set-row input[type=text]{flex:1;font-family:var(--body);font-size:15px;border:0;border-bottom:1.5px solid var(--ink);background:transparent;outline:0;padding:2px 4px;color:var(--ink)}

/* sketch toggle */
.toggle{position:relative;width:46px;height:24px;border:1.8px solid var(--ink);background:var(--paper);border-radius:999px;cursor:pointer;transition:background .15s}
.toggle::after{content:"";position:absolute;top:1.5px;left:2px;width:18px;height:18px;background:var(--ink);border-radius:50%;transition:left .15s}
.toggle.on{background:var(--marker-red)}
.toggle.on::after{left:24px;background:var(--paper)}

.field-card.sealed{
  background:
    repeating-linear-gradient(45deg, rgba(192,57,43,.06) 0 6px, transparent 6px 12px),
    var(--postit-pink);
  border:2px solid var(--marker-red);
}
.field-card.sealed .field-preview .placeholder{
  border-bottom-style:dashed;border-color:var(--marker-red);color:var(--marker-red);font-family:var(--type);font-size:14px;letter-spacing:.18em
}

/* publish bar */
.publish-bar{
  margin-top:24px;padding:16px 18px;
  background:var(--ink);color:var(--paper);
  border-radius:8px;
  display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  box-shadow:4px 4px 0 var(--marker-red);
}
.publish-bar .left{font-family:var(--type);font-size:12px;letter-spacing:.08em}
.publish-bar .left b{font-family:var(--hand);font-size:24px;font-weight:400;color:var(--paper);margin-right:4px}

/* ============================================== */
/* SUBMIT (respondent view)                         */
/* ============================================== */
.submit-grid{display:grid;grid-template-columns:1.05fr .9fr;gap:30px;align-items:flex-start}
@media (max-width:980px){.submit-grid{grid-template-columns:1fr}}

.s-form-card{position:relative}
.s-form-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.gate-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;font-family:var(--type);font-size:11px;letter-spacing:.1em;border:1.5px solid var(--marker-blue);background:var(--postit-blue);color:var(--marker-blue);border-radius:999px;transform:rotate(-1deg)}

.q-block{margin-bottom:24px;padding-bottom:16px;border-bottom:1px dashed var(--line)}
.q-block:last-child{border-bottom:0}
.q-block .num{font-family:var(--hand);font-size:18px;color:var(--marker-red);margin-right:6px}
.q-block .q-text{font-family:var(--hand);font-size:24px;color:var(--ink);margin:0 0 8px;line-height:1.15}

.radio-row{display:flex;gap:10px;flex-wrap:wrap}
.r-option{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1.8px solid var(--ink);border-radius:999px;background:var(--paper);font-family:var(--body);font-size:16px;cursor:pointer;transition:transform .12s ease, background .12s}
.r-option:hover{background:var(--postit);transform:translate(-1px,-1px)}
.r-option .circle{width:14px;height:14px;border-radius:50%;border:1.6px solid var(--ink);background:var(--paper);display:inline-block}
.r-option.checked{background:var(--postit);transform:rotate(-1deg)}
.r-option.checked .circle{background:var(--marker-red);border-color:var(--marker-red);box-shadow:inset 0 0 0 3px var(--paper)}

.s-receipt{display:flex;flex-direction:column;gap:18px}
.s-receipt .receipt-card{
  background:var(--paper-2);border:2px dashed var(--ink);border-radius:6px;padding:22px;
  font-family:var(--type);font-size:13px;
  position:relative;transform:rotate(.8deg);
  box-shadow:var(--shadow);
}
.s-receipt .receipt-card::before{content:"";position:absolute;left:50%;top:-13px;transform:translateX(-50%) rotate(-3deg);width:84px;height:20px;background:var(--tape);border:1px solid rgba(150,110,30,.2);border-radius:2px}
.s-receipt .receipt-card h5{font-family:var(--hand);font-size:26px;margin:0 0 12px;color:var(--marker-red);border-bottom:1.5px dashed var(--ink);padding-bottom:8px}
.s-receipt .receipt-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--line);gap:8px}
.s-receipt .receipt-row:last-child{border-bottom:0}
.s-receipt .receipt-row b{font-family:var(--hand);font-size:18px;color:var(--ink);font-weight:400}

/* trust column items */
.trust{background:var(--paper-2);border:2px solid var(--ink);border-radius:8px;padding:18px;box-shadow:3px 3px 0 var(--ink);transform:rotate(-.5deg)}
.trust h5{font-family:var(--hand);font-size:24px;margin:0 0 8px;color:var(--ink)}
.trust p{font-family:var(--body);font-size:15px;color:var(--ink-soft);margin:0 0 12px;line-height:1.45}
.trust .row{display:flex;justify-content:space-between;align-items:center;font-family:var(--type);font-size:12px;color:var(--pencil);padding:4px 0;border-top:1px dashed var(--line)}
.trust .row b{font-family:var(--hand);font-size:18px;color:var(--ink);font-weight:400}

/* success modal (overlay) */
.modal-bg{position:fixed;inset:0;background:rgba(33,27,20,.55);backdrop-filter:blur(2px);z-index:50;display:none;align-items:center;justify-content:center;padding:30px}
.modal-bg.open{display:flex}
.modal{
  position:relative;max-width:540px;width:100%;
  background:var(--paper-2);
  background-image:
    repeating-linear-gradient(180deg, transparent 0 31px, var(--rule) 31px 32px),
    linear-gradient(90deg, transparent 0 56px, var(--margin) 56px 57px, transparent 57px 100%);
  border-radius:6px;
  padding:42px 36px 28px 70px;
  box-shadow:8px 8px 0 var(--ink), 0 30px 60px -10px rgba(0,0,0,.5);
  transform:rotate(-1deg);
}
.stamp{
  position:absolute;top:-20px;right:-26px;
  font-family:var(--hand);font-size:42px;font-weight:700;color:var(--marker-red);
  border:4px double var(--marker-red);padding:8px 20px;border-radius:8px;
  transform:rotate(8deg);
  background:rgba(244,236,214,.5);
  letter-spacing:.04em;
}
.modal h3{font-family:var(--hand);font-size:48px;font-weight:700;margin:0 0 6px;color:var(--ink);line-height:1}
.modal p{font-family:var(--body);font-size:17px;color:var(--ink-soft);margin:0 0 18px}
.modal .receipt-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-family:var(--type);font-size:13px}
.modal .receipt-row b{font-family:var(--hand);font-size:18px;color:var(--ink);font-weight:400}
.modal .actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}

/* ============================================== */
/* ADMIN                                            */
/* ============================================== */
.admin-grid{display:grid;grid-template-columns:1fr 360px;gap:30px;align-items:flex-start}
@media (max-width:1080px){.admin-grid{grid-template-columns:1fr}}

.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
@media (max-width:780px){.adm-stats{grid-template-columns:repeat(2,1fr)}}
.stat{
  background:var(--paper-2);border:2px solid var(--ink);border-radius:8px;padding:14px;
  box-shadow:3px 3px 0 var(--ink);
}
.stat:nth-child(1){transform:rotate(-.5deg)}
.stat:nth-child(2){transform:rotate(.4deg);background:var(--postit)}
.stat:nth-child(3){transform:rotate(-.3deg);background:var(--postit-mint)}
.stat:nth-child(4){transform:rotate(.5deg);background:var(--postit-blue)}
.stat .label{font-family:var(--type);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--pencil);margin-bottom:2px}
.stat b{font-family:var(--hand);font-size:36px;line-height:1;display:block;color:var(--ink)}
.stat small{font-family:var(--body);font-size:13px;color:var(--ink-soft)}

/* submissions table — like a ledger */
.ledger{background:var(--paper-2);border:2px solid var(--ink);border-radius:8px;box-shadow:4px 4px 0 var(--ink);overflow:hidden}
.ledger-h{padding:14px 18px;border-bottom:2px solid var(--ink);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:#f6ecc8}
.ledger-h h4{font-family:var(--hand);font-size:30px;margin:0;line-height:1}
.ledger-h .filter{font-family:var(--type);font-size:12px;color:var(--pencil)}
.ledger-row{
  display:grid;
  grid-template-columns:50px 1fr 130px 90px 120px 80px;
  align-items:center;
  padding:12px 18px;
  border-bottom:1px dashed var(--line);
  font-family:var(--body);font-size:15px;cursor:pointer;
  transition:background .12s;
}
.ledger-row:hover{background:#fff5cd}
.ledger-row.selected{background:#fff0a8}
.ledger-row.head{background:transparent;cursor:default;font-family:var(--type);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pencil);border-bottom:1.5px solid var(--ink)}
.ledger-row.head:hover{background:transparent}
.ledger-row .id{font-family:var(--hand);color:var(--marker-red);font-size:18px}
.ledger-row .who{display:flex;flex-direction:column;gap:1px}
.ledger-row .who b{font-family:var(--hand);font-size:18px;color:var(--ink);font-weight:400}
.ledger-row .who small{font-family:var(--type);font-size:11px;color:var(--pencil)}
.ledger-row .tx{font-family:var(--type);font-size:12px;color:var(--ink)}
.ledger-row .when{font-family:var(--type);font-size:12px;color:var(--pencil)}
.ledger-row .sev{font-family:var(--hand);font-size:18px}
.sev.high{color:var(--marker-red)}
.sev.med{color:#a07a1a}
.sev.low{color:var(--marker-green)}
.ledger-row .open{justify-self:end;font-family:var(--hand);font-size:16px;color:var(--marker-blue);text-decoration:underline wavy}
@media(max-width:780px){.ledger-row{grid-template-columns:1fr 80px;font-size:13px}.ledger-row .when,.ledger-row .tx,.ledger-row .id,.ledger-row .sev{display:none}}

/* detail card right */
.detail{position:sticky;top:96px}
.detail .det-card{
  background:var(--paper-2);
  background-image:repeating-linear-gradient(180deg, transparent 0 31px, var(--rule) 31px 32px);
  border:2px solid var(--ink);border-radius:8px;
  padding:22px 22px 18px;
  box-shadow:5px 5px 0 var(--ink);
  transform:rotate(.6deg);
}
.detail h4{font-family:var(--hand);font-size:30px;margin:0 0 4px;color:var(--ink);line-height:1.05}
.detail .det-meta{font-family:var(--type);font-size:11px;color:var(--pencil);letter-spacing:.06em;margin-bottom:14px}
.detail .det-section{margin-top:14px;padding-top:12px;border-top:1px dashed var(--ink)}
.detail .det-section .label{font-family:var(--type);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--pencil);margin-bottom:6px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.detail .answer{font-family:var(--hand);font-size:22px;color:var(--ink);line-height:1.2}
.detail .answer.sealed{
  position:relative;background:var(--postit-pink);border:1.5px dashed var(--marker-red);border-radius:6px;
  padding:10px 12px;font-family:var(--type);font-size:13px;color:var(--marker-red);letter-spacing:.16em;
}
.detail .answer.sealed.opened{
  background:var(--postit-mint);border-color:var(--marker-green);color:var(--ink);
  font-family:var(--hand);font-size:22px;letter-spacing:0;
}
.decrypt-btn{padding:3px 9px;font-family:var(--type);font-size:10px;letter-spacing:.1em;border:1px solid var(--marker-red);background:var(--postit-pink);color:var(--marker-red);border-radius:4px;cursor:pointer}
.decrypt-btn.opened{background:var(--postit-mint);border-color:var(--marker-green);color:var(--marker-green)}

.proof-row{display:flex;justify-content:space-between;font-family:var(--type);font-size:12px;padding:3px 0;color:var(--pencil)}
.proof-row b{font-family:var(--hand);font-size:16px;color:var(--ink);font-weight:400}

/* doodle helpers */
.arrow-svg{position:absolute;color:var(--marker-red);pointer-events:none;z-index:0}
.section-eyebrow{font-family:var(--type);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--pencil)}

/* tweaks panel mount (the panel itself is in tweaks-panel.jsx) */
[data-tweaks-mount]{position:fixed;bottom:18px;right:18px;z-index:60}

<body>

<header class="nav">

<div class="wrap" id="root"></div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">

      <button class="btn btn-primary btn-sm" onclick="closeModal()">Close</button>

<script>
/* ---- mini state ---- */
const state = {
  tab: 'builder',
  selectedField: 'f2',
  fields: [
    {id:'f1', kind:'short', label:'TITLE', q:'Title', placeholder:'One-line summary…', required:true, sealed:false},
    {id:'f2', kind:'select', label:'SEVERITY', q:'Severity', options:['low','medium','high — blocking','critical'], required:true, sealed:false},
    {id:'f3', kind:'long', label:'DESCRIPTION', q:'What happened?', placeholder:'Steps to reproduce, expected vs actual…', required:true, sealed:false},
    {id:'f4', kind:'short', label:'EMAIL', q:'Reporter email', placeholder:'you@where.xyz', required:false, sealed:true},
    {id:'f5', kind:'file', label:'SCREENSHOT', q:'Screenshot (optional)', placeholder:'drop a file or browse', required:false, sealed:true},
  ],
  submissions: [
    {id:1, who:'0x9f1a…e2c', alias:'walrus.builder.sui', tx:'0x4a2c…b91', when:'12 min ago', sev:'high', title:'Aggregator timeout on epoch rollover'},
    {id:2, who:'0x4d8e…07a', alias:'devnet-anon', tx:'0xeb1d…c2f', when:'48 min ago', sev:'med', title:'Quilt write returns 500 with >32 files'},
    {id:3, who:'0x227b…f44', alias:'sui.frens', tx:'0x77a0…9ee', when:'2 hr ago', sev:'low', title:'Typo in CLI help text'},
    {id:4, who:'0x5e60…71d', alias:'mover.sui', tx:'0x3091…42a', when:'5 hr ago', sev:'high', title:'Seal key rotation breaks decrypt of old blobs'},
    {id:5, who:'0xc02f…ab9', alias:'(redacted)', tx:'0x9d12…06b', when:'1 day ago', sev:'med', title:'Aggregator picks unhealthy node sometimes'},
    {id:6, who:'0xe11a…3c8', alias:'wal-watch', tx:'0x12bd…77c', when:'2 day ago', sev:'low', title:'Storage cost docs out of date'},
  ],
  selectedSub: 1,
  decrypted: false,
};
const $ = sel => document.querySelector(sel);
const root = $('#root');

/* ---- tab switching ---- */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  state.tab = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x===t));
  state.decrypted = false;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}));

/* ---- render dispatcher ---- */
function render(){
  if(state.tab==='builder') renderBuilder();
  else if(state.tab==='submit') renderSubmit();
  else renderAdmin();
}

/* ============ BUILDER ============ */
function renderBuilder(){
  const fld = state.fields.find(f=>f.id===state.selectedField) || state.fields[0];
  root.innerHTML = `
    <div class="sheet">
      <div class="sheet-head">
        <span>Builder · draft #017</span>
        <span class="date">May 10, 2026</span>
      </div>
      <h1>Sketch your <span class="marker">form</span>.</h1>
      <p class="lede">Drag a field type from the palette, click to edit, toggle 🔒 to seal. Schema lives on Walrus, the form is a Sui shared object.</p>

      <div class="builder-grid">
        <aside class="palette">
          <h4>Field types</h4>
          <p>tap to add</p>
          <div class="palette-list" id="palette">
            ${[
              ['Aa','Short text','short'],
              ['¶','Long text','long'],
              ['◉','Single choice','select'],
              ['☑','Multi choice','multi'],
              ['#','Number','number'],
              ['📎','File upload','file'],
              ['📅','Date','date'],
              ['🔢','Wallet addr','wallet'],
            ].map(([ic,l,k])=>`<div class="palette-item" data-add="${k}"><span class="ico">${ic}</span>${l}</div>`).join('')}
          </div>
        </aside>

        <main class="canvas-wrap">
          <div class="form-meta">
            <div class="form-meta-l">
              <h2 contenteditable="true" spellcheck="false">Walrus bug report
                <small>FORM ID · 0x4a2c…b91</small>
              </h2>
              <p contenteditable="true" spellcheck="false">Help us track issues across the testnet.</p>
            </div>
          </div>

          <div class="field-stack" id="fieldStack">
            ${state.fields.map((f,i)=>fieldCard(f,i+1)).join('')}
            <button class="add-field" onclick="addField('short')">＋ add another field</button>
          </div>

          <div class="publish-bar">
            <div class="left">
              <b>${state.fields.length} fields</b>
              · ${state.fields.filter(f=>f.sealed).length} sealed · gate off · 12 epochs
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-sm">Preview</button>
              <button class="btn btn-primary btn-sm">Publish to Walrus →</button>
            </div>
          </div>
        </main>

        <aside class="settings">
          <div class="set-card selected">
            <h5>🪶 Field — <span style="color:var(--marker-red)">${fld.label.toLowerCase()}</span></h5>
            <div class="set-row"><label>Question</label><input type="text" value="${fld.q}" oninput="updateField('${fld.id}','q',this.value)"/></div>
            <div class="set-row"><label>Required</label><div class="toggle ${fld.required?'on':''}" onclick="toggleField('${fld.id}','required')"></div></div>
            <div class="set-row"><label>🔒 Sealed</label><div class="toggle ${fld.sealed?'on':''}" onclick="toggleField('${fld.id}','sealed')"></div></div>
            ${fld.sealed?`<div style="font-family:var(--type);font-size:11px;color:var(--marker-red);background:var(--postit-pink);padding:8px;border:1.2px dashed var(--marker-red);border-radius:5px;margin-top:8px">Encrypted client-side. Only your wallet (2-of-3) can decrypt.</div>`:''}
          </div>

          <div class="set-card">
            <h5>🌐 Form settings</h5>
            <div class="set-row"><label>Token gate</label><div class="toggle"></div></div>
            <div class="set-row"><label>Epochs</label><span style="font-family:var(--hand);font-size:22px;color:var(--ink)">12</span></div>
            <div class="set-row"><label>Public count</label><div class="toggle on"></div></div>
          </div>

          <div class="postit" style="background:var(--postit-blue);transform:rotate(-2deg);margin-top:6px">
            <b>tip</b>
            Click a field card to edit it. Sealed fields render as <code>▒▒▒▒</code> for everyone except you.
          </div>
        </aside>
      </div>
    </div>
  `;

  document.querySelectorAll('[data-add]').forEach(el=>el.addEventListener('click',()=>addField(el.dataset.add)));
  document.querySelectorAll('.field-card').forEach(c=>c.addEventListener('click',(e)=>{
    if(e.target.closest('.icon-btn')||e.target.closest('input')||e.target.closest('[contenteditable]'))return;
    state.selectedField = c.dataset.id; render();
  }));
}

function fieldCard(f,n){
  let preview = '';
  if(f.kind==='short'||f.kind==='wallet'||f.kind==='number'||f.kind==='date') preview = `<div class="placeholder">${f.placeholder||'…'}</div>`;
  else if(f.kind==='long') preview = `<div class="placeholder box">${f.placeholder||'…'}</div>`;
  else if(f.kind==='file') preview = `<div class="placeholder box" style="text-align:center;color:var(--pencil)">📎 drop a file or browse</div>`;
  else if(f.kind==='select') preview = (f.options||['option']).map(o=>`<span class="opt">${o}</span>`).join('');
  else if(f.kind==='multi') preview = (f.options||['option']).map(o=>`<span class="opt" style="">${o}</span>`).join('').replace(/○/g,'☐');
  if(f.sealed) preview = `<div class="placeholder">▒▒▒▒-▒▒▒▒-▒▒-▒▒▒▒▒▒▒</div>`;

  return `
  <div class="field-card ${state.selectedField===f.id?'selected':''} ${f.sealed?'sealed':''}" data-id="${f.id}">
    <span class="grip">⋮⋮</span>
    <div class="field-card-h">
      <div class="label-line">
        <span style="font-family:var(--hand);font-size:18px;color:var(--marker-red)">Q${n}.</span>
        <span>${f.kind}</span>
        ${f.sealed?`<span class="lock-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>sealed</span>`:''}
      </div>
      <div class="field-card-actions">
        <button class="icon-btn ${f.sealed?'lock-on':''}" title="Toggle seal" onclick="event.stopPropagation();toggleField('${f.id}','sealed')">
          ${f.sealed
            ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`
            :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0V11"/></svg>`}
        </button>
        <button class="icon-btn" title="Duplicate" onclick="event.stopPropagation();duplicateField('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg></button>
        <button class="icon-btn" title="Delete" onclick="event.stopPropagation();removeField('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div>
    </div>
    <div class="field-q" contenteditable="true" spellcheck="false" oninput="updateField('${f.id}','q',this.textContent)">${f.q}</div>
    <div class="field-preview">${preview}</div>
    <div class="field-meta">
      <span class="req-toggle">${f.required?'required ✓':'optional'}</span>
      <span>id · field/${f.id}</span>
    </div>
  </div>
  `;
}

window.updateField = (id,k,v)=>{const f=state.fields.find(x=>x.id===id);if(!f)return;f[k]=v;};
window.toggleField = (id,k)=>{const f=state.fields.find(x=>x.id===id);if(!f)return;f[k]=!f[k];render();};
window.duplicateField = (id)=>{const f=state.fields.find(x=>x.id===id);if(!f)return;const c={...f,id:'f'+(Date.now()%9999)};const i=state.fields.indexOf(f);state.fields.splice(i+1,0,c);render();};
window.removeField = (id)=>{state.fields=state.fields.filter(x=>x.id!==id);if(state.fields[0])state.selectedField=state.fields[0].id;render();};
window.addField = (k)=>{const id='f'+(Date.now()%9999);state.fields.push({id,kind:k,label:k.toUpperCase(),q:'New '+k+' field',placeholder:'…',required:false,sealed:false});state.selectedField=id;render();};

/* ============ SUBMIT ============ */
function renderSubmit(){
  root.innerHTML = `
    <div class="sheet">
      <div class="sheet-head">
        <span>Submit · respondent view</span>
        <span class="date">May 10, 2026</span>
      </div>

      <div class="submit-grid">
        <div class="s-form-card">
          <div class="s-form-head">
            <span class="chip"><span class="dot" style="width:6px;height:6px;border-radius:50%;background:var(--marker-red);display:inline-block"></span>form#017</span>
            <span class="gate-badge">🔓 open · no token gate</span>
          </div>
          <h1>Walrus bug report</h1>
          <p class="lede">Help us track issues across the testnet. Your reply is signed by your wallet, sealed in Walrus, and notarized on Sui.</p>

          <form onsubmit="event.preventDefault();openModal()">
            <div class="q-block">
              <p class="q-text"><span class="num">Q1.</span> Title <span class="req">*</span></p>
              <input class="input" placeholder="One-line summary…" value="Aggregator timeout on epoch rollover" required>
            </div>

            <div class="q-block">
              <p class="q-text"><span class="num">Q2.</span> Severity <span class="req">*</span></p>
              <div class="radio-row">
                ${['low','medium','high — blocking','critical'].map((o,i)=>`<label class="r-option ${i===2?'checked':''}"><span class="circle"></span>${o}<input type="radio" name="sev" ${i===2?'checked':''} hidden></label>`).join('')}
              </div>
            </div>

            <div class="q-block">
              <p class="q-text"><span class="num">Q3.</span> What happened? <span class="req">*</span></p>
              <textarea class="textarea" placeholder="Steps to reproduce, expected vs actual…" required>At epoch boundary the aggregator returns 504 for 30-90s before recovering. Repro: write blob, wait for epoch flip, attempt read.</textarea>
            </div>

            <div class="q-block">
              <p class="q-text"><span class="num">Q4.</span> Reporter email
                <span class="lock-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>sealed</span>
              </p>
              <input class="input" placeholder="you@where.xyz" value="hexreporter@catat.io">
              <small style="font-family:var(--type);font-size:11px;color:var(--marker-red);letter-spacing:.06em">Encrypted in your browser before it leaves. Only the form owner can read it.</small>
            </div>

            <div class="q-block">
              <p class="q-text"><span class="num">Q5.</span> Screenshot
                <span class="lock-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>sealed</span>
              </p>
              <div class="placeholder box" style="font-family:var(--hand);font-size:20px;color:var(--pencil);text-align:center;padding:18px;border:2px dashed var(--ink);border-radius:6px">📎 drop a file or browse — <span style="color:var(--marker-red)">aggregator-504.png</span> attached</div>
            </div>

            <div style="margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
              <button class="btn btn-primary" type="submit">Sign &amp; submit
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              </button>
              <span style="font-family:var(--hand);font-size:20px;color:var(--marker-red);transform:rotate(-2deg);display:inline-flex;align-items:center;gap:6px">
                <svg width="40" height="20" viewBox="0 0 60 30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22 C 14 5, 30 4, 50 16"/><path d="M44 8 L52 16 L44 22"/></svg>
                wallet will sign — no email!
              </span>
            </div>
          </form>
        </div>

        <aside class="s-receipt">
          <div class="receipt-card">
            <h5>📝 what gets signed</h5>
            <div class="receipt-row"><span>5 fields</span><b>3 plain · 2 sealed</b></div>
            <div class="receipt-row"><span>walrus quilt</span><b>1 batched write</b></div>
            <div class="receipt-row"><span>storage</span><b>12 epochs</b></div>
            <div class="receipt-row"><span>seal key</span><b>2-of-3</b></div>
            <div class="receipt-row"><span>gas (sui)</span><b>~0.0021</b></div>
          </div>

          <div class="trust">
            <h5>Why bother?</h5>
            <p>This isn't a Google Form. Your reply is provable: anyone can fetch the blob, anyone can verify the count from Sui state, no admin can quietly delete you.</p>
            <div class="row"><span>identity</span><b>0xA1c2…F09e</b></div>
            <div class="row"><span>signature</span><b>ed25519</b></div>
            <div class="row"><span>blob ID</span><b>(after submit)</b></div>
          </div>

          <div class="postit" style="background:var(--postit-mint);transform:rotate(2deg)">
            <b>good to know</b>
            Your wallet pays gas, but Walrus storage is paid by the form owner. Replies are <em>free</em> for you.
          </div>
        </aside>
      </div>
    </div>
  `;
}

}
window.closeModal = ()=>$('#modalBg').classList.remove('open');
