<?xml version="1.0" encoding="UTF-8"?>
<!--
  catat OpenGraph logo — paper sheet with the new "c" monogram brand
  card on the left, wordmark + tagline on the right. Used as the
  share image on Twitter/Discord/Telegram/Slack via og:image.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- paper background -->
  <defs>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="200" height="200">
      <rect width="200" height="200" fill="#f4ecd6"/>
      <circle cx="20" cy="40" r="0.6" fill="#e9dfc1" opacity="0.6"/>
      <circle cx="120" cy="80" r="0.5" fill="#dccfa8" opacity="0.4"/>
      <circle cx="60" cy="160" r="0.5" fill="#e9dfc1" opacity="0.6"/>
      <circle cx="180" cy="120" r="0.4" fill="#dccfa8" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Walrus blue notebook ruling -->
  <g stroke="#1f6fb2" stroke-width="0.6" opacity="0.18">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>
  <line x1="120" y1="0" x2="120" y2="630" stroke="#7fb6dd" stroke-width="2"/>

  <!-- Brand mark card — the new monogram, scaled up -->
  <g transform="translate(180 230) rotate(-3)">
    <!-- ink card with Walrus blue drop shadow -->
    <rect x="8" y="10" width="160" height="160" rx="22" fill="#1f6fb2"/>
    <rect x="0" y="0" width="160" height="160" rx="22" fill="#211b14"/>
    <!-- highlighter strip behind letter -->
    <rect x="22" y="86" width="116" height="36" rx="6" fill="#9bd2ff"/>
    <!-- handwritten c -->
    <path
      d="M122 64 C 105 42, 53 42, 41 75 C 31 102, 53 134, 99 134 C 113 134, 128 128, 134 117"
      stroke="#f4ecd6" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- marker dot -->
    <circle cx="135" cy="120" r="11" fill="#1f6fb2"/>
  </g>

  <!-- wordmark + tagline -->
  <g fill="#211b14">
    <text x="380" y="320" font-family="Caveat, 'Patrick Hand', cursive"
          font-size="170" font-weight="700">catat</text>
    <text x="380" y="380" font-family="'Atkinson Hyperlegible', system-ui, sans-serif"
          font-size="36" fill="#3a3128">
      Walrus-native form &amp; feedback platform
    </text>
    <text x="380" y="430" font-family="'Special Elite', monospace"
          font-size="22" fill="#6b665e" letter-spacing="2">
      WALRUS · SUI · SEAL · ON-CHAIN PROOF
    </text>
  </g>

  <!-- corner stamp -->
  <g transform="translate(960 110) rotate(8)">
    <rect x="0" y="0" width="200" height="60" rx="4" fill="#1f6fb2"/>
    <text x="100" y="38" font-family="'Special Elite', monospace" font-size="22" font-weight="700"
          fill="#f4ecd6" text-anchor="middle" letter-spacing="3">PUBLISHED</text>
  </g>
</svg>
