<?xml version="1.0" encoding="UTF-8"?>
<!--
  catat favicon — handwritten "c" monogram on cream paper with a Walrus
  Blue highlighter swipe behind. Single-letter mark scales cleanly to
  16/32/48px favicon sizes. The highlighter strip is the brand visual
  language carrier (matches .marker class behind hero headlines).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- paper square base, rounded + slight rotation for the "tilted page" feel -->
  <rect x="3" y="3" width="58" height="58" rx="10" fill="#f4ecd6" transform="rotate(-3 32 32)"/>
  <!-- Walrus Blue highlighter swipe behind the letter -->
  <rect x="11" y="34" width="42" height="14" rx="2" fill="#9bd2ff"
        transform="rotate(-3 32 32)" opacity="0.95"/>
  <!-- handwritten "c" — single open arc, ink stroke, rotated slightly -->
  <g transform="rotate(-3 32 32)" stroke="#211b14" stroke-width="6"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M48 24 C 41 16, 23 16, 18 28 C 14 38, 22 50, 36 49 C 42 49, 47 46, 50 42"/>
  </g>
  <!-- tiny marker dot — the "i love it" tick that says completion/check -->
  <circle cx="49.5" cy="44.5" r="3" fill="#1f6fb2" transform="rotate(-3 32 32)"/>
</svg>
