<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="catat — Walrus-native form & feedback platform. Submissions stored on Walrus, sealed via Seal, proven on Sui. Open-source, paper-aesthetic." />
    <meta name="theme-color" content="#f4ecd6" />

    <!-- OpenGraph (Twitter, Discord, Telegram, Slack link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="catat — Walrus-native form platform" />
    <meta property="og:description" content="Forms with cryptographic proof, not vendor promises. Built on Walrus + Sui + Seal." />
    <meta property="og:url" content="https://catat-walrus.vercel.app/" />
    <!-- og:image is a raster PNG — social unfurlers (Discord/Twitter/Slack)
         don't render SVG. Generate public/og.png from design/og-image.html
         (instructions in that file). 1200×630. -->
    <meta property="og:image" content="https://catat-walrus.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="catat" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="catat — Walrus-native form platform" />
    <meta name="twitter:description" content="Forms with cryptographic proof. Built on Walrus + Sui + Seal." />
    <meta name="twitter:image" content="https://catat-walrus.vercel.app/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;500;600;700&family=Kalam:wght@300;400;700&family=Patrick+Hand&family=Special+Elite&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <title>catat — Walrus-native form platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
