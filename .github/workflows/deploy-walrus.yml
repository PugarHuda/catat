name: Deploy to Walrus Sites

# Manual-only — auto-trigger on push spammed CI failures whenever the deploy
# wallet ran out of testnet SUI. Walrus Sites needs ~0.5 SUI per deploy
# (escrow for storage epochs), and the faucet caps at 1 SUI/hour, so frequent
# deploys outpace the funding rate. Workflow is now invoked on demand:
#
#   gh workflow run "Deploy to Walrus Sites"
#
# Before triggering: ensure deploy wallet 0x57fd58a5...e27b has ≥0.5 SUI +
# ≥0.05 WAL on testnet. Top up at faucet.sui.io and walrus.site/faucet.
on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Storage epochs (1 epoch ≈ 24h on testnet)'
        required: false
        default: '5'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Build site
        run: npm run web:build

      - name: Deploy to Walrus Sites
        uses: MystenLabs/walrus-sites-github-actions/deploy@v3
        with:
          SUI_BECH32_PRIVATE_KEY: ${{ secrets.SUI_BECH32_PRIVATE_KEY }}
          SUI_NETWORK: testnet
          DIST: ./packages/web/dist
          EPOCHS: ${{ inputs.epochs || '5' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
