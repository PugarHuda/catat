name: Deploy to Vercel

# Auto-deploy production to https://catat-walrus.vercel.app on every push
# to main that touches the web package. Manual trigger also available via
# the Actions tab.
#
# Setup (one-time, by repo admin):
#   1. Create a Vercel access token: https://vercel.com/account/tokens
#      Scope = "Full account" (the cli needs project + deploy permissions).
#   2. Add it as a GitHub secret named `VERCEL_TOKEN`:
#      gh secret set VERCEL_TOKEN
#
# The non-secret org + project IDs are hardcoded below — they're public
# identifiers, knowing them doesn't grant access without the token.

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_NdlwQPgRp4Fn2WzyuKh1BLB2
      VERCEL_PROJECT_ID: prj_iRTd7GqPWInWu1xkjhSRdh4kEP10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        # Vercel server-side periodically requires CLI ≥ N.x for new
        # endpoint shapes. Use `latest` so deploys don't suddenly break
        # when Vercel rolls API versions — the trade-off is occasional
        # CLI behavior changes, but those are rare and usually backwards-
        # compatible. v47.2.2 is the current floor as of May 2026.
        run: npm install --global vercel@latest

      - name: Deploy to Vercel production
        id: deploy
        # Remote-build flow (no --prebuilt): upload source, Vercel builds
        # on their infra with whatever Node version the project is
        # configured for. This matches the manual `vercel --prod` flow.
        # We skip `vercel pull` + `vercel build` because the project is
        # set to Node 24.x and Vercel CLI's local build doesn't support
        # that yet — letting Vercel do the build sidesteps the version
        # mismatch entirely.
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"
        working-directory: packages/web

      - name: Summary
        run: |
          echo "## ✅ Deployed to Vercel" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Aliased to: https://catat-walrus.vercel.app" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
